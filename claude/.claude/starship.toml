"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
palette = "everforest"

format = """
[](fg:bg1)\
${env_var.CLAUDE_MODEL_NAME}\
[](fg:bg1 bg:yellow)\
${custom.repo}\
[](fg:yellow bg:aqua)\
$git_branch\
$git_status\
${env_var.CLAUDE_CTX_OK}\
${env_var.CLAUDE_CTX_WARN}\
${env_var.CLAUDE_CTX_CRIT}
[-](fg:bg_term)
[](fg:blue)\
${custom.focus_label}\
${custom.focus_status}\
"""


# -- Model segment (dark bg) --
[env_var.CLAUDE_MODEL_NAME]
variable = "CLAUDE_MODEL_NAME"
format = "[ $env_value ](bg:bg1 fg:fg)"

# -- Git branch (aqua bg) --
[git_branch]
symbol = ""
style = "bg:aqua fg:bg_dim"
format = "[ $symbol $branch ]($style)"

# -- Repo: owner repository name, worktree-aware (shows owner repo, not the
#    worktree slug, when a worktree is checked out) --
[custom.repo]
command = "$HOME/.claude/bin/repo-info.sh"
when = "true"
shell = ["bash", "--noprofile", "--norc"]
style = "bg:yellow fg:bg_dim"
format = "[ $output ]($style)"

[git_status]
style = "bg:aqua fg:bg_dim"
format = "[($all_status$ahead_behind )]($style)"

# -- Context: normal (green on dark bg) --
[env_var.CLAUDE_CTX_OK]
variable = "CLAUDE_CTX_OK"
format = "[](fg:aqua bg:bg3)[ $env_value ](bg:bg3 fg:green)[](fg:bg3)"

# -- Context: warning (yellow on dark bg) --
[env_var.CLAUDE_CTX_WARN]
variable = "CLAUDE_CTX_WARN"
format = "[](fg:aqua bg:bg3)[ $env_value ](bg:bg3 fg:yellow)[](fg:bg3)"

# -- Context: critical (red on dark bg) --
[env_var.CLAUDE_CTX_CRIT]
variable = "CLAUDE_CTX_CRIT"
format = "[](fg:aqua bg:bg3)[ $env_value ](bg:bg3 fg:red)[](fg:bg3)"

# -- Story focus (blue bg, replaces cost) --
[custom.focus_label]
command = "$HOME/.claude/bin/focus-info.sh label"
when = "true"
shell = ["bash", "--noprofile", "--norc"]
format = "[ $output ](bg:blue fg:bg_dim)[](fg:blue bg:bg1)"


# -- Story status (bg1, orange text) --
[custom.focus_status]
command = "$HOME/.claude/bin/focus-info.sh status"
when = "true"
shell = ["bash", "--noprofile", "--norc"]
format = "[ $output ](bg:bg1 fg:orange)[](fg:bg1)"

# -- Everforest palette --
[palettes.everforest]
bg_dim = "#232a2e"
bg_term = "#2b3339"  # ghostty everforest-hard terminal bg (invisible spacer)
bg0 = "#2d353b"
bg1 = "#343f44"
bg2 = "#3d484d"
bg3 = "#475258"
bg4 = "#4f585e"
bg5 = "#56635f"
fg = "#d3c6aa"
red = "#e67e80"
orange = "#e69875"
yellow = "#dbbc7f"
green = "#a7c080"
aqua = "#83c092"
blue = "#7fbbb3"
purple = "#d699b6"
grey0 = "#7a8478"
grey1 = "#859289"
grey2 = "#9da9a0"
